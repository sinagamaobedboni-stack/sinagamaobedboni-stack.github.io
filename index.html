<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Simple</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: #eef2f7;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    background: #4a90e2;
    color: #fff;
    padding: 15px;
    font-size: 1.5em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  header .add-file {
    font-size: 1.5em;
    cursor: pointer;
  }

  #chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    background: #fff;
  }

  .message {
    margin: 8px 0;
    max-width: 70%;
    padding: 10px 15px;
    border-radius: 15px;
    clear: both;
    word-wrap: break-word;
    line-height: 1.4;
  }

  .user {
    background: #4a90e2;
    color: #fff;
    float: right;
    text-align: right;
  }

  .bot {
    background: #e0e0e0;
    color: #333;
    float: left;
    text-align: left;
  }

  .typing {
    display: inline-block;
  }

  .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    margin: 0 2px;
    background: #333;
    border-radius: 50%;
    animation: blink 1s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 20%, 50%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
    60% { opacity: 1; }
  }

  #input-area {
    display: flex;
    padding: 10px;
    background: #f5f5f5;
  }

  #messageInput {
    flex: 1;
    padding: 10px 15px;
    font-size: 1em;
    border-radius: 25px;
    border: 1px solid #ccc;
    outline: none;
  }

  button {
    padding: 10px 20px;
    margin-left: 10px;
    border: none;
    background: #4a90e2;
    color: #fff;
    border-radius: 25px;
    cursor: pointer;
    font-size: 1em;
  }

  button:hover {
    background: #357ABD;
  }

  @media (max-width: 600px) {
    .message { max-width: 85%; }
    header { font-size: 1.2em; }
    button { padding: 10px; font-size: 0.9em; }
  }
</style>
</head>
<body>

<header>
  Chat Simple
  <div class="add-file">+</div>
</header>

<div id="chat"></div>

<div id="input-area">
  <input type="text" id="messageInput" placeholder="Écrire un message...">
  <button onclick="sendMessage()">Envoyer</button>
</div>

<script>
const chatDiv = document.getElementById('chat');
const messageInput = document.getElementById('messageInput');

// Affiche un message dans le chat
function displayMessage(text, sender) {
  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${sender}`;
  msgDiv.textContent = text;
  chatDiv.appendChild(msgDiv);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

// Animation "l'agent écrit"
function showTyping() {
  const typingDiv = document.createElement('div');
  typingDiv.className = 'message bot typing';
  typingDiv.id = 'typingIndicator';
  typingDiv.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  chatDiv.appendChild(typingDiv);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

// Supprime l'animation
function hideTyping() {
  const typingDiv = document.getElementById('typingIndicator');
  if (typingDiv) typingDiv.remove();
}

// Envoie le message au Webhook
async function sendMessage() {
  const message = messageInput.value.trim();
  if (!message) return;

  displayMessage(message, 'user');
  messageInput.value = '';

  showTyping();

  try {
    const response = await fetch('https://hook.eu2.make.com/i8616vrf6nm33hsjmdicv5l3e1le26e9', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });

    const data = await response.json();
    hideTyping();
    displayMessage(data.reply || 'Pas de réponse', 'bot');

  } catch (err) {
    hideTyping();
    displayMessage('Erreur de communication avec le serveur', 'bot');
    console.error(err);
  }
}

// Envoi message avec Enter
messageInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    sendMessage();
  }
});
</script>

</body>
</html>
